baseURL: "https://syoh.org/" 
title: Sang-Yun Oh
theme: PaperMod

enableInlineShortcodes: true
enableRobotsTXT: true
pagination:
    pagerSize: 20

taxonomies:
    tag: tags

menu:
    main:
        - name: Papers
          url: papers
          weight: 2
        - name: Courses
          url: courses/
          weight: 3
        - name: Tags
          url: tags/
          weight: 4

params:
    description: "Sang-Yun Oh's Academic Homepage"
    author: Sang-Yun Oh
    # googleAnalyticsID: "G-XXXXX"
    DateFormat: "January 2006"
    defaultTheme: light
    hideFooter: false
    disableThemeToggle: true
    ShowShareButtons: false
    ShowReadingTime: false
    disableSpecial1stPost: true
    disableAnchoredHeadings: true
    ShowPostNavLinks: false
    ShowBreadCrumbs: false
    ShowCodeCopyButtons: true
    ShowAllPagesInArchive: false
    MainSections: ["papers", "courses"]
    ShowToc: false
    disableScrollToTop: true
    TocOpen: true
    ShowWordCount: false
    UseHugoToc: true
    comments: false
    math: true
    profileMode:
        enabled: true
        title: Sang-Yun Oh
        subtitle: "I am an Associate Professor in the Department of Statistics & Applied Probability at UC Santa Barbara and a Faculty Scientist at Lawrence Berkeley National Laboratory. My research focuses on developing scalable methods for statistical inference and high-performance computing to uncover complex relationships in large-scale data. I apply these tools to challenges in genomics, finance, and neuroscience."
        imageUrl: "profile-picture.jpg"
        imageWidth: 160
        imageHeight: 160
        buttons:
            - name: Papers
              url: papers
            - name: Courses
              url: courses/
            - name: Tags
              url: tags/

    socialIcons:
        - name: CV
          url: cv.pdf
        - name: Location
          url: location/
        - name: Google Scholar
          url: https://scholar.google.com/citations?user=1z6dv-MAAAAJ
        - name: GitHub
          url: https://github.com/syoh

    assets:
        disableScrollBarStyle: true
    cover:
        hiddenInList: false
        hiddenInSingle: true
    label:
      text: "Sang-Yun Oh"
      icon: favicon.ico
      iconHeight: 18

markup:
    goldmark:
        renderer:
            unsafe: true
    highlight:
        guessSyntax: true
        style: autumn 
    tableOfContents:
        endLevel: 2
        ordered: false
        startLevel: 2